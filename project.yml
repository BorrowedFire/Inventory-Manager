name: InventoryManager
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.inventorymanager.app
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 14.0
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    GENERATE_INFOPLIST_FILE: NO
targets:
  InventoryManager:
    type: application
    platform: macOS
    info:
      path: Resources/Info.plist
    sources:
      - Sources
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Resources/python
        buildPhase: resources
        type: folder
      - path: Resources/Scripts
        buildPhase: resources
        type: folder
      - path: Resources/IconRasters
        buildPhase: resources
        type: folder
      - path: Resources/Icons
        buildPhase: resources
        type: folder
      - path: Resources/IconSources
        buildPhase: resources
        type: folder
    settings:
      base:
        PRODUCT_NAME: Inventory Manager
        EXECUTABLE_NAME: InventoryManager
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleIconFile: AppIcon
        INFOPLIST_KEY_CFBundleIconName: AppIcon
    dependencies:
      - sdk: AppKit.framework
      - sdk: PDFKit.framework
      - sdk: SwiftUI.framework
      - sdk: UniformTypeIdentifiers.framework
      - sdk: libsqlite3.tbd
